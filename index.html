    .nav-tab {

    }
    .nav-live {

      font-size: 0.65rem; font-weight: 700; padding: 3px 8px;
      border-radius: 3px; letter-spacing: 1px;
    }

    .hero {
      background: linear-gradient(135deg, #1a1f71 0%, #0d1147 60%, #12154e 100%);
      padding: 32px 40px 40px; color: #fff;
    }
    .hero-eyebrow { font-size: 0.68rem; font-weight: 700; letter-spacing: 2px; color: #ffe600; margin-bottom: 8px; }
    .hero-title   { font-size: 1.9rem; font-weight: 900; line-height: 1; margin-bottom: 8px; }
    .hero-title span { color: #ffe600; }
    .hero-desc  { font-size: 0.82rem; color: #a8b4d8; line-height: 1.6; max-width: 580px; }
    .hero-hint {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 14px;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12);
      border-radius: 6px; padding: 8px 14px; font-size: 0.74rem; color: #c8d4f0;
    }

    /* ── DIAGRAM ── */
    .diagram-wrap { padding: 28px 32px 56px; max-width: 780px; margin: 0 auto; }

    /* ── OWNER BLOCK ── */
    .owner-block { margin-bottom: 10px; }

    .owner-node {
      display: flex; align-items: center; gap: 12px;
      background: #fff; border: 2px solid #e0e6f0; border-left: 4px solid;
      border-radius: 8px; padding: 12px 16px;
      cursor: pointer; user-select: none;
      box-shadow: 0 2px 6px rgba(0,0,0,.07);
      transition: box-shadow .2s;
    }
    .owner-node:hover { box-shadow: 0 4px 14px rgba(0,0,0,.12); }
    .owner-avatar {
      width: 36px; height: 36px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 0.75rem; color: #fff; flex-shrink: 0;
    }
    .owner-info { flex: 1; }
    .owner-name  { font-weight: 700; font-size: 0.95rem; color: #1a1f71; }
    .owner-count { font-size: 0.7rem; color: #999; margin-top: 1px; }
    .owner-chevron {
      font-size: 0.75rem; color: #999; transition: transform .2s; flex-shrink: 0;
    }
    .owner-node.open .owner-chevron { transform: rotate(90deg); }

    /* ── CAUSES TREE ── */
    .causes-tree {
      display: none;
      padding-left: 20px;
      border-left: 2px dashed #d0d8e8;
      margin-left: 18px;
      margin-top: 4px;
      margin-bottom: 4px;
    }
    .causes-tree.open { display: block; }

    /* ── CAUSE ROW ── */
    .cause-wrap { position: relative; padding: 3px 0; }

    /* horizontal tick to cause */
    .cause-wrap::before {
      content: '';
      position: absolute;
      left: -20px; top: 18px;
      width: 20px; height: 2px;
      background: #d0d8e8;
    }

    .cause-node {
      display: flex; align-items: flex-start; gap: 8px;
      background: #fff; border: 1px solid #e4e8f0; border-left: 3px solid;
      border-radius: 6px; padding: 9px 12px;
      cursor: pointer; user-select: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: box-shadow .15s;
    }
    .cause-node:hover { box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .cause-node.open  { border-bottom-left-radius: 2px; border-bottom-right-radius: 2px; }

    .cause-label {
      flex: 1; font-size: 0.8rem; font-weight: 700;
      color: #1a1f71; font-family: 'Courier New', monospace; word-break: break-word;
    }
    .cause-chevron { font-size: 0.7rem; color: #bbb; transition: transform .2s; flex-shrink: 0; margin-top: 1px; }
    .cause-node.open .cause-chevron { transform: rotate(90deg); }

    /* ── BRANCHES (Descripción + Lógica) ── */
    .branches-wrap {
      display: none;
      padding-left: 18px;
      border-left: 2px dashed #e4e8f0;
      margin-left: 12px;
    }
    .branches-wrap.open { display: block; }

    .branch-item { position: relative; padding: 3px 0; }

    .branch-item::before {
      content: '';
      position: absolute;
      left: -18px; top: 16px;
      width: 18px; height: 2px;
      background: #e4e8f0;
    }

    .branch-node {
      display: flex; align-items: center; gap: 7px;
      background: #f8f9ff; border: 1px solid #e4e8f0; border-radius: 5px;
      padding: 7px 11px; cursor: pointer; user-select: none;
      transition: background .15s;
    }
    .branch-node:hover { background: #eef1fb; }

    .branch-icon { font-size: 0.82rem; flex-shrink: 0; }
    .branch-label { font-size: 0.77rem; font-weight: 600; color: #334; flex: 1; }
    .branch-chevron { font-size: 0.65rem; color: #bbb; transition: transform .2s; }
    .branch-node.open .branch-chevron { transform: rotate(90deg); }

    .branch-content {
      display: none;
      background: #f0f3ff;
      border: 1px solid #dde3f5;
      border-top: none;
      border-radius: 0 0 5px 5px;
      padding: 8px 11px;
      font-size: 0.74rem; color: #444; line-height: 1.5;
    }
    .branch-content.open { display: block; }
    .branch-content.empty { color: #aaa; font-style: italic; }

    /* logic content gets orange tint */
    .branch-item.logic .branch-content {
      background: #fff8f0;
      border-color: #fde4c0;
      color: #7a4400;
    }
    .branch-item.logic .branch-node {
      background: #fff8f0;
      border-color: #fde4c0;
    }
    .branch-item.logic .branch-node:hover { background: #fef0dc; }
    .branch-item.logic .branch-label { color: #7a4400; }
  </style>

function build() {
  const diagram = document.getElementById('diagram');

  OWNERS.forEach(owner => {
    // owner block wrapper
    const block = document.createElement('div');
    block.className = 'owner-block';

    // owner node
    const ownerNode = document.createElement('div');
    ownerNode.className = 'owner-node';
    ownerNode.style.borderLeftColor = owner.color;
    ownerNode.innerHTML = `
      <div class="owner-avatar" style="background:${owner.color}">${owner.id}</div>
      <div class="owner-info">
        <div class="owner-name">${owner.name}</div>
        <div class="owner-count">${owner.causes.length} causa${owner.causes.length !== 1 ? 's' : ''}</div>
      </div>
      <span class="owner-chevron">▶</span>
    `;

    // causes tree
    const causesTree = document.createElement('div');
    causesTree.className = 'causes-tree';

    owner.causes.forEach(cause => {
      const causeWrap = document.createElement('div');
      causeWrap.className = 'cause-wrap';

      // cause node
      const causeNode = document.createElement('div');
      causeNode.className = 'cause-node';
      causeNode.style.borderLeftColor = owner.color + 'aa';
      causeNode.innerHTML = `
        <span class="cause-label">${cause.label}</span>
        <span class="cause-chevron">▶</span>
      `;

      // branches (Descripción + Lógica)
      const branchesWrap = document.createElement('div');
      branchesWrap.className = 'branches-wrap';

      // — Descripción branch
      const descItem = document.createElement('div');
      descItem.className = 'branch-item';
      const descNode = document.createElement('div');
      descNode.className = 'branch-node';
      descNode.innerHTML = `<span class="branch-icon">📄</span><span class="branch-label">Descripción</span><span class="branch-chevron">▶</span>`;
      const descContent = document.createElement('div');
      descContent.className = 'branch-content' + (cause.desc ? '' : ' empty');
      descContent.textContent = cause.desc || 'Sin descripción por ahora.';
      descNode.addEventListener('click', e => { e.stopPropagation(); toggleBranch(descNode, descContent); });
      descItem.appendChild(descNode);
      descItem.appendChild(descContent);

      // — Lógica branch
      const logicItem = document.createElement('div');
      logicItem.className = 'branch-item logic';
      const logicNode = document.createElement('div');
      logicNode.className = 'branch-node';
      logicNode.innerHTML = `<span class="branch-icon">⚙️</span><span class="branch-label">Lógica</span><span class="branch-chevron">▶</span>`;
      const logicContent = document.createElement('div');
      logicContent.className = 'branch-content' + (cause.logic ? '' : ' empty');
      logicContent.textContent = cause.logic || 'Sin lógica definida por ahora.';
      logicNode.addEventListener('click', e => { e.stopPropagation(); toggleBranch(logicNode, logicContent); });
      logicItem.appendChild(logicNode);
      logicItem.appendChild(logicContent);

      branchesWrap.appendChild(descItem);
      branchesWrap.appendChild(logicItem);

      // toggle cause → show branches
      causeNode.addEventListener('click', () => {
        const isOpen = branchesWrap.classList.toggle('open');
        causeNode.classList.toggle('open', isOpen);
      });

      causeWrap.appendChild(causeNode);
      causeWrap.appendChild(branchesWrap);
      causesTree.appendChild(causeWrap);
    });

    // toggle owner → show causes
    ownerNode.addEventListener('click', () => {
      const isOpen = causesTree.classList.toggle('open');
      ownerNode.classList.toggle('open', isOpen);
    });

    block.appendChild(ownerNode);
    block.appendChild(causesTree);
    diagram.appendChild(block);
  });
}

function toggleBranch(node, content) {
  const isOpen = content.classList.toggle('open');
  node.classList.toggle('open', isOpen);
}

build();
</script>
</body>
</html>
